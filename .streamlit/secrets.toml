import streamlit as st
import pandas as pd
from datetime import datetime

# --- 1. إعدادات الصفحة والهوية البصرية ---
st.set_page_config(
    page_title="منصة مفتشي حماية المستهلك | اقتصادية دبي", 
    page_icon="🛡️", 
    layout="wide"
)

# تنسيق CSS احترافي بألوان حكومة دبي
st.markdown("""
<style>
    /* التنسيق العام لليمين (RTL) */
    [data-testid="stAppViewContainer"] { direction: rtl; text-align: right; }
    [data-testid="stHeader"] { direction: rtl; }
    [data-testid="stSidebar"] { direction: rtl; }
    
    /* ألوان الأزرار (أحمر دبي الرسمي) */
    div.stButton > button {
        width: 100%;
        border-radius: 8px;
        background-color: #E6192E;
        color: white;
        border: none;
        font-weight: bold;
    }
    
    /* تنبيهات السياسة الإعلامية */
    .policy-box {
        padding: 15px;
        background-color: #fff3f3;
        border-right: 5px solid #E6192E;
        margin-bottom: 20px;
        border-radius: 5px;
    }
</style>
""", unsafe_allow_html=True)

# --- 2. القائمة الجانبية (الشعار والبيانات) ---
with st.sidebar:
    # يمكنك استبدال الرابط برابط صورة شعار دائرة الاقتصاد والسياحة الرسمي
    st.image("https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Flag_of_the_United_Abrab_Emirates.svg/255px-Flag_of_the_United_Arab_Emirates.svg.png", width=80)
    st.title("نظام المفتش الذكي 👮")
    st.info(f"📅 تاريخ اليوم: {datetime.now().strftime('%Y-%m-%d')}")
    
    st.markdown("---")
    st.markdown("### ⚠️ تذكير بالسياسة الإعلامية")
    st.caption("يمنع التصريح للإعلام دون الرجوع لإدارة الاتصال الحكومي. التزم بتقديم المعلومات الفنية فقط.")

# --- 3. العنوان الرئيسي ---
st.title("🛡️ المنصة الذكية لحماية المستهلك - دبي")

# --- 4. التبويبات الرئيسية ---
tab1, tab2, tab3 = st.tabs(["📞 نقاط الاتصال بالشركات", "📝 تسجيل مخالفة ميدانية", "💬 المساعد القانوني"])

# --- التبويب الأول: دليل الاتصال (مربوط بالملف المرفق) ---
with tab1:
    st.subheader("دليل التواصل مع ضباط الامتثال في الشركات")
    
    # محاكاة رفع الملف أو قراءته مباشرة إذا كان في المسار
    uploaded_file = st.file_uploader("ارفع ملف Contacts.xlsb لتحديث البيانات", type=["xlsb", "xlsx"])
    
    if uploaded_file:
        try:
            df_contacts = pd.read_excel(uploaded_file, engine='pyxlsb') # استخدام المحرك المناسب للملف
            search = st.text_input("🔍 ابحث عن (اسم الشركة، القطاع، أو البريد الإلكتروني):")
            
            if search:
                mask = df_contacts.astype(str).apply(lambda x: x.str.contains(search, case=False, na=False)).any(axis=1)
                results = df_contacts[mask]
                st.success(f"تم العثور على {len(results)} مسؤول اتصال")
                st.dataframe(results, use_container_width=True)
            else:
                st.dataframe(df_contacts, use_container_width=True)
                
            st.warning("🔒 تنبيه: هذه البيانات سرية وحساسة طبقاً للمادة (7) من سياسة المتحدث الرسمي.")
        except Exception as e:
            st.error(f"خطأ في تحميل البيانات: {e}")
    else:
        st.info("💡 يرجى رفع ملف دليل الاتصالات المرفق لتفعيل البحث المباشر.")

# --- التبويب الثاني: تسجيل المخالفات ---
with tab2:
    st.subheader("إضافة تقرير مخالفة جديد")
    
    if "violation_list" not in st.session_state:
        st.session_state.violation_list = []

    with st.form("violation_form", clear_on_submit=True):
        col1, col2 = st.columns(2)
        with col1:
            inspector = st.text_input("اسم المفتش المسؤول")
            sector = st.selectbox("قطاع المنشأة", ["التجزئة", "السيارات", "التجارة الإلكترونية", "الإلكترونيات"])
        with col2:
            v_type = st.selectbox("نوع التجاوز", ["سلع مقلدة", "تضليل في الأسعار", "عدم الالتزام بسياسة الاسترجاع"])
            fine = st.number_input("الغرامة التقديرية (درهم)", min_value=0, value=2000)
            
        submitted = st.form_submit_button("حفظ المخالفة في النظام")
        if submitted:
            new_v = {
                "التوقيت": datetime.now().strftime("%H:%M:%S"),
                "المفتش": inspector, 
                "القطاع": sector, 
                "المخالفة": v_type, 
                "الغرامة": fine
            }
            st.session_state.violation_list.append(new_v)
            st.success("✅ تم حفظ المخالفة بنجاح وتجهيزها للرفع المزامنة.")

    if st.session_state.violation_list:
        st.write("### قائمة المخالفات المسجلة اليوم")
        st.table(st.session_state.violation_list)

# --- التبويب الثالث: المساعد القانوني (بناءً على السياسة) ---
with tab3:
    st.subheader("💬 مساعد المفتش للسياسات والإجراءات")
    
    st.markdown("""
    <div class="policy-box">
    <strong>💡 توجيهات الميدان:</strong><br>
    بناءً على سياسة المتحدث الرسمي، تذكر دائماً:<br>
    - تجنب استخدام كلمة "لا تعليق".<br>
    - وجه الإعلاميين إلى قسم الاتصال (مدير الإدارة: المتحدث الأول).<br>
    - حماية حقوق المستهلك هي الرسالة الأساسية التي نروج لها.
    </div>
    """, unsafe_allow_html=True)

    if "messages" not in st.session_state:
        st.session_state.messages = []

    for msg in st.session_state.messages:
        with st.chat_message(msg["role"]):
            st.markdown(msg["content"])

    if prompt := st.chat_input("اسأل عن إجراء قانوني أو سياسة الاتصال..."):
        st.session_state.messages.append({"role": "user", "content": prompt})
        with st.chat_message("user"):
            st.markdown(prompt)
        
        with st.chat_message("assistant"):
            # ردود ذكية بناءً على السياسة المرفقة
            if "إعلام" in prompt or "صحافة" in prompt:
                response = "طبقاً للمادة (6)، يجب توجيه كافة الاستفسارات الإعلامية إلى إدارة الاتصال الحكومي. يمنع التصريح المباشر."
            elif "حساسة" in prompt:
                response = "المعلومات الحساسة تشمل التشريعات والرسوم والبيانات الفنية، ويتم التعامل معها من قبل مكتب المدير العام حصراً."
            else:
                response = f"أهلاً بك. بخصوص '{prompt}'، يرجى التأكد من توثيق الحالة في التبويب الثاني والرجوع لدليل الإجراءات الميدانية."
            
            st.markdown(response)
            st.session_state.messages.append({"role": "assistant", "content": response})

